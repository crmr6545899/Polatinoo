<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pomodoro Timer - Polatino</title>
</head>
<body>
    <div class="container">
        <h1>🍅 Pomodoro Timer</h1>
        <div class="session-label" id="sessionLabel">Work Time</div>
        <div id="timer" class="timer">25:00</div>
        <div class="buttons">
            <button id="start" class="btn btn-start">Start</button>
            <button id="pause" class="btn btn-pause">Pause</button>
            <button id="reset" class="btn btn-reset">Reset</button>
        </div>
        <div class="stats">
            <p>Sessions: <span id="sessions">0</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polatino Settings</title>
    <style>
        /* เพิ่ม CSS เล็กน้อยให้ดูเป็นระเบียบ */
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #status-message {
            margin-top: 15px;
            color: green;
            font-weight: bold;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Timer Settings</h1>
    
    <div class="form-group">
        <label for="work-duration">Work Duration (minutes): </label>
        <input type="number" id="work-duration" min="1" value="25">
    </div>

    <div class="form-group">
        <label for="break-duration">Break Duration (minutes): </label>
        <input type="number" id="break-duration" min="1" value="5">
    </div>

    <button type="button" id="save-btn">Save Settings</button>
    <div id="status-message">Settings Saved!</div>

    <script>
        // เมื่อโหลดหน้าเว็บ ให้ดึงค่าที่เคยบันทึกไว้ (ถ้ามี) มาแสดง
        document.addEventListener('DOMContentLoaded', () => {
            const savedWork = localStorage.getItem('polatino_work_duration');
            const savedBreak = localStorage.getItem('polatino_break_duration');

            if (savedWork) {
                document.getElementById('work-duration').value = savedWork;
            }
            if (savedBreak) {
                document.getElementById('break-duration').value = savedBreak;
            }
        });

        // เมื่อกดปุ่ม Save
        document.getElementById('save-btn').addEventListener('click', function() {
            // ดึงค่าตัวเลขจากช่อง Input
            const workDuration = document.getElementById('work-duration').value;
            const breakDuration = document.getElementById('break-duration').value;

            // ตรวจสอบความถูกต้องเบื้องต้น (เผื่อผู้ใช้กรอกค่าติดลบหรือไม่ได้กรอก)
            if (workDuration < 1 || breakDuration < 1) {
                alert("Please enter a valid time (at least 1 minute).");
                return;
            }

            // บันทึกค่าลงใน Local Storage ของเบราว์เซอร์
            localStorage.setItem('polatino_work_duration', workDuration);
            localStorage.setItem('polatino_break_duration', breakDuration);

            // แสดงข้อความแจ้งเตือนว่าบันทึกสำเร็จ
            const statusMessage = document.getElementById('status-message');
            statusMessage.style.display = 'block';
            
            // ซ่อนข้อความหลังจาก 3 วินาที
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 3000);

            // TODO: หากคุณมีหน้านาฬิกาจับเวลาแยกต่างหาก คุณสามารถใช้ window.location.href = 'timer.html'; เพื่อเปลี่ยนหน้าได้ที่นี่
        });
    </script>
</body>
</html>
