<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pomodoro Timer - Polatino</title>
</head>
<body>
    <div class="container">
        <h1>🍅 Pomodoro Timer</h1>
        <div class="session-label" id="sessionLabel">Work Time</div>
        <div id="timer" class="timer">25:00</div>
        <div class="buttons">
            <button id="start" class="btn btn-start">Start</button>
            <button id="pause" class="btn btn-pause">Pause</button>
            <button id="reset" class="btn btn-reset">Reset</button>
        </div>
        <div class="stats">
            <p>Sessions: <span id="sessions">0</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polatino</title>
</head>
<body>
    <h1>Customize Work and Break Durations</h1>
    <label for="work-duration">Work Duration (minutes): </label>
    <input type="number" id="work-duration" name="work-duration" min="1" value="25">
    <br>
    <label for="break-duration">Break Duration (minutes): </label>
    <input type="number" id="break-duration" name="break-duration" min="1" value="5">
    <br>
    <button type="submit">Save</button>
</body>
</html>
